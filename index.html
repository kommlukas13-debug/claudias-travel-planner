<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Planner</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f8;
}

header{
  background:#4e8060;
  color:white;
  padding:15px;
  text-align:center;
}

.tabs{
  display:flex;
  background:#ddd;
}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

.tab.active{
  background:white;
  font-weight:bold;
}

.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

input, button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#4e8060;
  color:white;
  border:none;
  cursor:pointer;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.error{
  color:red;
  display:none;
}

.error.show{
  display:block;
}
</style>
</head>

<body>

<header>Travel Planner</header>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Discover</div>
  <div class="tab" onclick="showTab(1)">Trips</div>
</div>

<!-- DISCOVER TAB -->
<div class="page active" id="discover">

<h3>Find Places</h3>

<input id="city" placeholder="Enter city or leave blank for nearby">
<button onclick="doSearch()">Search</button>

<div id="error-msg" class="error"></div>
<div id="results"></div>

</div>

<!-- TRIPS TAB (placeholder) -->
<div class="page" id="trips">
<h3>Your Trips</h3>
<p>Coming soon...</p>
</div>

<script>

// ---------------- API KEY ----------------
var APIKEY = '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';

// ---------------- TAB SWITCH ----------------
function showTab(index){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', i===index);
  });

  document.querySelectorAll('.page').forEach((p,i)=>{
    p.classList.toggle('active', i===index);
  });
}

// ---------------- SAFE GROQ CALL ----------------
function callGroq(prompt, maxTokens, onSuccess, onError){
  var xhr = new XMLHttpRequest();
  xhr.open('POST','https://api.groq.com/openai/v1/chat/completions',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+APIKEY);

  xhr.onload = function(){
    try{
      var data = JSON.parse(xhr.responseText);

      if(data.error){
        console.error('API error:', data.error);
        onError(data.error.message);
        return;
      }

      var text = data.choices?.[0]?.message?.content || '';

      if(!text){
        onError('Empty API response');
        return;
      }

      var clean = text.replace(/```json/g,'').replace(/```/g,'').trim();

      try{
        var parsed = JSON.parse(clean);
        onSuccess(parsed);
      } catch(e){
        console.error('Bad JSON:', clean);
        onError('Invalid response format');
      }

    }catch(e){
      console.error('Parse error:', e);
      onError(e.message);
    }
  };

  xhr.onerror = function(){
    onError('Network error');
  };

  xhr.send(JSON.stringify({
    model:'llama-3.3-70b-versatile',
    max_tokens:maxTokens,
    messages:[{role:'user',content:prompt}]
  }));
}

// ---------------- ERROR ----------------
function setError(msg){
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function clearError(){
  var el = document.getElementById('error-msg');
  el.textContent = '';
  el.classList.remove('show');
}

// ---------------- RENDER ----------------
function renderResults(results){
  var wrap = document.getElementById('results');
  wrap.innerHTML = '';

  if(!Array.isArray(results)){
    setError('Unexpected response');
    return;
  }

  results.forEach(p=>{
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <strong>${p.name || 'Unknown'}</strong><br>
      ${p.address || ''}<br>
      ⭐ ${p.rating || 'N/A'}
    `;
    wrap.appendChild(div);
  });
}

// ---------------- SEARCH ----------------
function doSearch(){
  clearError();

  var city = document.getElementById('city').value.trim();

  if(!city){
    if(!navigator.geolocation){
      setError('Enter a city or enable location');
      return;
    }

    navigator.geolocation.getCurrentPosition(pos=>{
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      runSearch(`near ${lat},${lon}`);
    }, ()=>{
      setError('Location permission denied');
    });

  } else {
    runSearch(city);
  }
}

function runSearch(location){
  var prompt = `Suggest 6 popular tourist places in ${location}.
Return ONLY a JSON array like:
[
 {\"name\":\"...\",\"address\":\"...\",\"rating\":4.5}
]`;

  callGroq(prompt, 1000, function(results){
    renderResults(results);
  }, function(err){
    setError(err || 'Something went wrong');
  });
}

</script>

</body>
</html>
